<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2A0055">
    <title>N.O.V.A - Ferramentas para Minecraft</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <meta charset="UTF-8">


</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <img src="img/Logo escura.png" alt="Logo N.O.V.A" class="logo-img">
                    <h1 class="neon-title" data-text="N.O.V.A">N.O.V.A</h1>
                </div>

                <nav class="nav-menu">
                    <a href="hub.html" class="nav-link active">Home</a>
                    <a href="quemSou.html" class="nav-link">Quem Sou</a>
                    <a href="contateme.html" class="nav-link">Contateme</a>
                    <a href="config.html" class="nav-link">Configurações</a>
                </nav>
            </div>
        </div>
        <div class="divider top-divider"></div>
    </header>

    <!-- MAIN -->
    <main class="main-content py-5">
        <canvas id="galaxy-canvas" class="galaxy-canvas"></canvas>

        <div class="container">
            <h2 class="minecraft-title">Ferramentas para Minecraft</h2>

            <div class="minecraft-box">
                <div class="minecraft-grid">

                    <!-- Servidor -->
                    <div class="minecraft-item">
                        <div class="minecraft-label">Exaruton</div>
                        <div class="minecraft-desc">Servidor de minecraft</div>
                        <a href="https://exaroton.com/"
                            class="btn-minecraft text-decoration-none text-center d-block mt-3">Botão</a>
                    </div>

                    <!-- Seed e Mapa -->
                    <div class="minecraft-item">
                        <div class="minecraft-label">Seed map</div>
                        <div class="minecraft-desc">Ver a Seed do jogo</div>
                        <a href="https://www.chunkbase.com/apps/seed-map"
                            class="btn-minecraft text-decoration-none text-center d-block mt-3">Botão</a>
                    </div>

                    <!-- Minecraft skin -->
                    <div class="minecraft-item">
                        <div class="minecraft-label">Skin Minecraft</div>
                        <div class="minecraft-desc">Criador de Skin para Minecraft</div>
                        <a href="https://www.minecraftskins.com/skin-editor/"
                            class="btn-minecraft text-decoration-none text-center d-block mt-3">Botão</a>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="divider bottom-divider"></div>
        <div class="container py-3">
            <div class="text-center">
                <p class="footer-text">N.O.V.A - Por @Cristal Productions © 2026</p>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
