<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2A0055">
    <title>N.O.V.A - Espaço do Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <img src="img/Logo escura.png" alt="Logo N.O.V.A" class="logo-img">
                    <h1 class="neon-title" data-text="N.O.V.A">N.O.V.A</h1>
                </div>

                <nav class="nav-menu">
                    <a href="acesso.html" class="nav-link">Home</a>
                    <a href="quemSou.html" class="nav-link">Quem Sou</a>
                    <a href="contateme.html" class="nav-link active">Contateme</a>
                    <a href="config.html" class="nav-link">Configurações</a>
                </nav>
            </div>
        </div>
        <div class="divider top-divider"></div>
    </header>

    <!-- MAIN -->
    <main class="main-content d-flex align-items-center py-5">
        <canvas id="galaxy-canvas" class="galaxy-canvas"></canvas>

        <div class="container">
            <h2 class="contato-title">Contatenos!</h2>

            <div class="row justify-content-center g-5">

                <!-- Lado esquerdo - Informações -->
                <div class="col-lg-5">
                    <div class="form-left h-100">
                        <h4 class="text-cyan mb-4">N.O.V.A - Por @Cristal Productions</h4>
                        <p class="text-light">
                            Entre em contato conosco para parcerias, projetos ou dúvidas.<br><br>
                            Respondemos o mais rápido possível!
                        </p>

                        <!-- Campos de input -->
                        <input type="text" class="input-neon" placeholder="Nome" id="nome">
                        <div class="row g-3">
                            <div class="col-8">
                                <input type="tel" class="input-neon" placeholder="Número de telefone" id="telefone">
                            </div>
                            <div class="col-4">
                                <input type="number" class="input-neon" placeholder="Idade" id="idade">
                            </div>
                        </div>
                        <input type="email" class="input-neon" placeholder="Email" id="email">
                    </div>
                </div>

                <!-- Lado direito - Caixa de mensagem -->
                <div class="col-lg-6">
                    <div class="form-container">
                        <textarea class="textarea-neon" placeholder="Escreva algo aqui!" id="mensagem"></textarea>

                        <button onclick="enviarMensagem()" class="btn-enviar">
                            ENVIAR MENSAGEM
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">

        <div class="divider bottom-divider"></div>
        <div class="container py-3">
            <div class="text-center">
                <p class="footer-text">N.O.V.A - Por @Cristal Productions © 2026</p>
            </div>
        </div>

    </footer>

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
